apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestor
  namespace: crypto-analytics
spec:
  replicas: 2
  selector: {matchLabels: {app: ingestor}}
  template:
    metadata: {labels: {app: ingestor}}
    spec:
      containers:
        - name: ingestor
          image: crypto-analytics/ingestor:latest
          ports: [{containerPort: 8081}]
          envFrom: [{configMapRef: {name: crypto-config}}, {secretRef: {name: crypto-secrets}}]
          resources:
            requests: {cpu: 250m, memory: 256Mi}
            limits: {cpu: 1, memory: 512Mi}
---
apiVersion: v1
kind: Service
metadata: {name: ingestor, namespace: crypto-analytics}
spec:
  selector: {app: ingestor}
  ports: [{port: 8081, targetPort: 8081}]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: ingestor-hpa, namespace: crypto-analytics}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: ingestor}
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: {name: cpu, target: {type: Utilization, averageUtilization: 70}}
